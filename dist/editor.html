<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Markdown Editor</title>
  <script type="module" crossorigin src="/assets/editor-pHN9b9go.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/editor-CZdbPp6K.css">
</head>
<body>
  <div class="toolbar-custom">
    <button id="btn-import">导入文件</button>
    <button id="btn-export">导出文件</button>
    <button id="btn-copy">复制内容</button>
    <button id="btn-clear">清空缓存</button>
    <input type="file" id="file-input" accept=".md,.txt" style="display: none;" />
  </div>
  <div class="editor-container">
    <textarea id="mde-editor"></textarea>
  </div>
</body>
</html>
